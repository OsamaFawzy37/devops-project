version: '3.8'

services:
  # --- DATA LAYER ---
  redis:
    image: redis:7-alpine
    container_name: bb-redis
    restart: always
    ports:
      - 6379:6379
    volumes:
      - ./data/redis:/data

  mysql:
    image: mysql:8.0
    container_name: bb-mysql
    restart: always
    ports:
      - 3306:3306
    volumes:
      - ./data/mysql:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=buzzboard-mysql-root
      - MYSQL_USER=buzzboard
      - MYSQL_PASSWORD=buzzboard-mysql-secret
      - MYSQL_DATABASE=buzzboard
    healthcheck:
      # تعديل: استخدمنا الـ root عشان نتفادى مشاكل الصلاحيات في البداية
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # مهم جداً: بيدي فرصة للـ DB تقوم قبل ما يبدأ يحسب الـ failures

  # --- BACKEND LAYER ---
  reactions:
    build:
      context: ./backend/reactions
      dockerfile: Dockerfile
    container_name: bb-reactions
    restart: on-failure
    ports:
      - 8081:8080
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy # Node only starts once DB is ready
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=buzzboard-redis-secret
      - MYSQL_HOST=mysql
      - MYSQL_USER=buzzboard
      - MYSQL_PASSWORD=buzzboard-mysql-secret
      - MYSQL_DATABASE=buzzboard
      - JWT_SECRET=buzzboard-jwt-secret-change-in-production
      - SALT_ROUNDS=10
    volumes:
      - ./backend/reactions/server.js:/app/server.js
    command: ["node", "server.js"]

  mood:
    build:
      context: ./backend/mood
      dockerfile: Dockerfile
    container_name: bb-mood
    restart: on-failure
    ports:
      - 8082:8080
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=buzzboard-redis-secret
      - MYSQL_HOST=mysql
      - MYSQL_USER=buzzboard
      - MYSQL_PASSWORD=buzzboard-mysql-secret
      - MYSQL_DATABASE=buzzboard
      - JWT_SECRET=buzzboard-jwt-secret-change-in-production
      - SALT_ROUNDS=10
    volumes:
      - ./backend/mood/server.js:/app/server.js
    command: ["node", "server.js"]

  # --- FRONTEND LAYER ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bb-frontend
    ports:
      - 3001:80
    volumes:
      - ./frontend/public:/usr/share/nginx/html
      # Change the destination path here:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - reactions
      - mood
    environment:
      # Use port 8080 because that's the internal port inside the Docker network
      - REACTIONS_SVC_URL=http://reactions:8080
      - MOOD_SVC_URL=http://mood:8080